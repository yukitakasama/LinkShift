                  - /placeholder: " "
                  - text: "## 更新内容 - 修复「修改位置」时界面卡死无响应的问题：总大小统计改为后台线程计算，对话框立即弹出 - 进度对话框改为显示**实时传输速度**（而非平均速度），速度曲线按固定间隔采样、自动缩放 - 新增「取消」按钮：迁移/修改到一半可安全中止并回滚，原始文件保持不变 - 进度条在统计阶段进入不确定模式，拿到真实总量后切回确定模式 - 现同时提供 **64 位 (x64)**、**32 位 (x86)** 与 **Linux (x86_64)** 版本 ## 系统要求 - Windows 10/11（64 位或 32 位均可） - Linux（x86_64，glibc 2.17+，常见桌面发行版均可） - Windows 下需要管理员权限或开启「开发者模式」才能创建符号链接；Linux 下普通用户即可（部分只读/网络文件系统除外） ## 使用说明 - Windows：以管理员身份运行（或开启开发者模式），选择文件/文件夹与目标位置开始迁移 - Linux：终端执行 `chmod +x LinkShift-v1.1-Linux-x86_64` 后运行 `./LinkShift-v1.1-Linux-x86_64`（需要 libxcb、libgl 等 Qt 运行库，桌面发行版通常已自带） - 迁移：选择文件/文件夹与目标位置，开始迁移 - 修改位置：针对已迁移（符号链接）的项，把真实数据移动到新位置 - 过程中可观察实时速度曲线；如需中断，点击「取消」即可安全回滚 ## 构建说明 - 64 位 Windows 版本使用 PySide6（LGPL） - 32 位 Windows 版本使用 PyQt5（GPL），因为 PySide6 无 32 位 wheel - Linux 版本使用 PyQt5（GPL），通过 GitHub Actions CI 在 ubuntu-22.04 自动打包"
