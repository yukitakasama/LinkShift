name: Build Linux

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxkbcommon-x11-0 libgl1 libfontconfig1 \
            libdbus-1-3 libx11-6 libxext6 libxrender1 libx11-xcb1 \
            libegl1 libgl1-mesa-dri libxcb-xinerama0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-util1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "PyQt5>=5.15" pyinstaller

      - name: Smoke test (cross-platform imports)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "import ui.qt_compat as q; import ui.main_window, core.disk, core.symlink, core.migrator; print('import-ok', __import__('sys').platform, q.TOOLKIT)"

      - name: Build with PyInstaller
        env:
          QT_QPA_PLATFORM: offscreen
        run: pyinstaller build.spec --noconfirm

      - name: Package artifacts
        run: |
          mkdir -p out
          TAG="${{ github.ref_name }}"
          BINARY="LinkShift-${TAG}-Linux-x86_64"
          cp dist/LinkShift "out/${BINARY}"
          chmod +x "out/${BINARY}"
          file "out/${BINARY}"
          # Create tar.gz archive
          cp "out/${BINARY}" "${BINARY}"
          tar czf "out/${BINARY}.tar.gz" "${BINARY}"
          rm -f "${BINARY}"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" out/LinkShift-* --clobber
