name: Build Linux

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxkbcommon-x11-0 libgl1 libfontconfig1 \
            libdbus-1-3 libx11-6 libxext6 libxrender1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "PySide6>=6.6.0" pyinstaller

      - name: Smoke test (cross-platform imports)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "import ui.qt_compat, ui.main_window, core.disk, core.symlink, core.migrator; print('import-ok', __import__('sys').platform)"

      - name: Build with PyInstaller
        env:
          QT_QPA_PLATFORM: offscreen
        run: pyinstaller build.spec --noconfirm

      - name: Prepare artifact
        run: |
          mkdir -p out
          cp dist/LinkShift out/LinkShift-v1.1-Linux-x86_64
          chmod +x out/LinkShift-v1.1-Linux-x86_64
          file out/LinkShift-v1.1-Linux-x86_64

      - name: Upload to release v1.1
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1
          files: out/LinkShift-v1.1-Linux-x86_64
          fail_on_unmatched_files: false
